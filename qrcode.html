<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>QR Code — La belle échappée</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,900&family=DM+Sans:wght@400;700&display=swap');
  body{font-family:'DM Sans',sans-serif;background:#f4efe6;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
  .card{background:#fff;border-radius:24px;padding:40px 36px;text-align:center;box-shadow:0 4px 40px rgba(0,0,0,.12);max-width:360px;width:90%}
  .maison{font-family:'Fraunces',serif;font-style:italic;font-weight:900;font-size:28px;color:#3f5d45;margin:0 0 4px}
  .sub{font-size:14px;color:#8a8170;margin-bottom:24px}
  #qr{display:flex;justify-content:center;margin:0 auto}
  #qr img, #qr canvas{border-radius:12px;border:1px solid #e3dac9}
  .url{margin-top:16px;font-size:12px;color:#8a8170}
  .print-btn{margin-top:22px;background:#3f5d45;color:#fff;border:none;border-radius:12px;
    padding:12px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
  .print-btn:active{opacity:.85}
  @media print{
    body{background:#fff}
    .print-btn{display:none}
    .card{box-shadow:none;border:1px solid #e3dac9}
  }
</style>
</head>
<body>
<div class="card">
  <p class="maison">La belle échappée</p>
  <p class="sub">Scannez pour accéder au protocole d'entretien</p>
  <div id="qr"></div>
  <div class="url">entretienlocation.vercel.app</div>
  <button class="print-btn" onclick="window.print()">Imprimer</button>
</div>
<script>
new QRCode(document.getElementById('qr'), {
  text: 'https://entretienlocation.vercel.app/',
  width: 240,
  height: 240,
  colorDark: '#1f1b16',
  colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.H
});
</script>
</body>
</html>
